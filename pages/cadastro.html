<!DOCTYPE html>
<html>

    <head>
        <!-- Define o tipo de caracteres (acentos, etc.) -->
        <meta charset="UTF-8">

        <!-- Faz o site ficar responsivo em celulares -->
        <meta name="viewport" content="widht=device-width, initial-scale=1.0">

        <!-- Descrição do site (usado em buscadores tipo Google) -->
        <meta name="description" content="A café é a melhor cafeteria da região">

        <!-- Arquivo CSS principal -->
        <link rel="stylesheet" href="../css/style.css">

        <!-- CSS específico da página de login/cadastro -->
        <link rel="stylesheet" href="../css/auth.css">

        <!-- Título da aba do navegador -->
        <title>Café Central - A melhor cafeteria da região</title>
    </head>

    <body>

        <!-- ================= HEADER ================= -->
        <header class="topo">

            <!-- Logo do site -->
            <div class="logo">
                <a href="../index.html">Café<span>Central</span></a>
            </div>

            <!-- Menu de navegação -->
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="../pages/sobre.html">Sobre</a>
                <a href="../pages/contato.html">Contato</a>
                <a href="../pages/login.html">Login</a>
            </nav>
        </header>

        <!-- ================= CONTEÚDO PRINCIPAL ================= -->
        <main class="container pagina-auth">

            <!-- Bloco central do formulário -->
            <section class="bloco-auth">

                <!-- Título da página -->
                <h1>Cadastro</h1>

                <!-- Texto explicativo -->
                <p class="texto-auth">Crie sua conta para acessar o cardápio</p>

                <!-- Formulário de cadastro -->
                <form class="form-auth" id="formCadastro">

                    <!-- Campo nome -->
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>

                    <!-- Campo e-mail -->
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>

                    <!-- Campo senha -->
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>

                    <!-- Botão de envio -->
                    <button type="submit" class="btn-primario">Cadastrar</button>

                    <!-- Mensagem de erro ou sucesso -->
                    <p id="mensagem" class="mensagem-auth"></p>
                </form>

                <!-- Link para quem já tem conta -->
                <p class="link-auth">
                    Já possui uma conta?
                    <a href="../pages/login.html">Fazer Login</a>
                </p>

            </section>
        </main>

        <!-- ================= RODAPÉ ================= -->
        <footer class="rodape">
            <p>® 2026 Café Central. Todos os Direitos Reservados</p>
            <p><a href="../pages/contato.html">Entre em Contato</a></p>
        </footer>

        <!-- Arquivo JavaScript -->
        <script src="../js/auth.js"></script>

    </body>
</html>
