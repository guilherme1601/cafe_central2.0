<!DOCTYPE html>
<html>
<head>
    <!-- Título da aba -->
    <title>Contato</title>

    <!-- Permite usar acentos corretamente -->
    <meta charset="UTF-8">

    <!-- Deixa o site responsivo (funciona em celular) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Importa o CSS principal -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- ================= CABEÇALHO ================= -->
    <header class="topo">

        <!-- Logo do site -->
        <div class="logo">
            <a href="../index.html">Café<span>Central</span></a>
        </div>

        <!-- Menu de navegação -->
        <nav class="menu">
            <a href="../index.html">Início</a>
            <a href="../pages/sobre.html">Sobre</a>
            <a href="../pages/cardapio.html">Cardapio</a>

            <!-- Página atual -->
            <a href="../pages/contato.html" class="ativo">Contato</a>

            <a href="../pages/login.html">Login</a>
        </nav>
    </header>
    
    <!-- ================= CONTEÚDO ================= -->
    <section class="contato">

        <!-- Título -->
        <h2>Fale conosco</h2>

        <!-- Formulário -->
        <form id="formContato">

            <!-- Campo nome -->
            <label for="nome">Digite seu nome:</label>
            <input 
                type="text" 
                id="nome" 
                placeholder="Digite seu nome" 
                required 
                minlength="3"> <!-- mínimo de 3 caracteres -->

            <!-- Campo e-mail -->
            <label for="email">Digite seu e-mail:</label>
            <input 
                type="email" 
                id="email" 
                placeholder="Digite seu e-mail" 
                required> <!-- valida automaticamente formato de email -->

            <!-- Campo mensagem -->
            <label for="mensagem">Digite sua mensagem:</label>
            <textarea 
                rows="5" 
                id="mensagem" 
                required 
                minlength="10"></textarea> <!-- mínimo de 10 caracteres -->

            <!-- Botão de envio -->
            <button type="submit">Enviar</button>

            <!-- Área onde aparece mensagem de erro ou sucesso -->
            <p id="msgStatus"></p>
        </form>
    </section>

    <!-- ================= RODAPÉ ================= -->
    <footer class="rodape">
        <p>® 2026 Café Central. Todos os Direitos Reservados</p>
    </footer>

    <!-- Conecta com o JavaScript -->
    <script src="../js/contato.js"></script>

</body>
</html>
