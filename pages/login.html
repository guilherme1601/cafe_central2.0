<!DOCTYPE html>
<html lang="pt-BR"> <!-- Define o idioma da página (português do Brasil) -->

<head>
    <!-- ================= CONFIGURAÇÕES DO SITE ================= -->

    <!-- Permite usar acentos corretamente -->
    <meta charset="UTF-8">

    <!-- Faz o site funcionar bem em celulares (responsivo) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Descrição do site (usada no Google) -->
    <meta name="description" content="A Cafe Central oferece a melhor experiência da região.">

    <!-- CSS principal -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- CSS específico de login/cadastro -->
    <link rel="stylesheet" href="../css/auth.css">

    <!-- Título da aba -->
    <title>Cafe Central - A melhor cafeteria da região</title>
</head>

<body>

    <!-- ================= CABEÇALHO ================= -->
    <header class="topo">

        <!-- Logo -->
        <div class="logo">
            <a href="../index.html">Cafe<span>Central</span></a>
        </div>

        <!-- Menu de navegação -->
        <nav class="menu">
            <a href="../index.html">Início</a>
            <a href="../pages/sobre.html">Sobre</a>
            <a href="../pages/contato.html">Contato</a>
        </nav>
    </header>

    <!-- ================= CONTEÚDO PRINCIPAL ================= -->
    <main class="container pagina-auth">

        <!-- Caixa central do login -->
        <section class="bloco-auth">

            <!-- Título -->
            <h1>Login</h1>

            <!-- Texto explicativo -->
            <p class="texto-auth">
                Entre com seu e-mail e senha para acessar o cardápio
            </p>

            <!-- Formulário de login -->
            <form class="form-auth" id="formLogin">

                <!-- Campo e-mail -->
                <label for="emailLogin">E-mail</label>
                <input 
                    type="email" 
                    id="emailLogin" 
                    placeholder="Digite seu e-mail" 
                    required> <!-- obrigatório e valida formato -->

                <!-- Campo senha -->
                <label for="senhaLogin">Senha</label>
                <input 
                    type="password" 
                    id="senhaLogin" 
                    placeholder="Digite sua senha" 
                    required> <!-- obrigatório -->

                <!-- Botão de envio -->
                <button type="submit" class="btn-primario">Login</button>

                <!-- Mensagem de erro ou sucesso -->
                <p id="mensagemLogin" class="mensagem-auth"></p>
            </form>

            <!-- Link para cadastro -->
            <p class="link-auth">
                Ainda não possui uma conta?
                <a href="../pages/cadastro.html">Fazer Cadastro</a>
            </p>

        </section>
    </main>

    <!-- ================= RODAPÉ ================= -->
    <footer class="rodape">
        <p>® 2026 CafeCentral. Todos os Direitos Reservados</p>
        <p><a href="../pages/contato.html">Entre em Contato</a></p>
    </footer>

    <!-- Arquivo JavaScript responsável pela lógica de login -->
    <script src="../js/auth.js"></script>

</body>
</html>
